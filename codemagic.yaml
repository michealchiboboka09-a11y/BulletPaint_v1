workflows:
  bulletpaint-android-release:
    name: BulletPaint Android Release
    max_build_duration: 60
    environment:
      flutter: 3.22.3
      xcode: latest
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK Release
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - your-email@gmail.com￼Enter
